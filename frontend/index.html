<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Coach"/>
  <meta name="theme-color" content="#0d0d0f"/>
  <title>Running Coach</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body>

<!-- Login -->
<div id="login-screen" style="display:none">
  <div class="login-icon">🏃</div>
  <h1>Running Coach</h1>
  <p>Omri's private marathon<br>training assistant</p>
  <div class="login-box">
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="pw-input" class="form-input" type="password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-accent" onclick="doLogin()">Sign In</button>
    <p id="pw-error" style="color:var(--red);font-size:13px;display:none">Wrong password.</p>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Sidebar (desktop only) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">🏃</span>
      <span class="sidebar-logo-text">Running Coach</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-nav="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Today
      </button>
      <button class="nav-btn" data-nav="week">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Week
      </button>
      <button class="nav-btn" data-nav="goals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Goals
      </button>
      <button class="nav-btn" data-nav="analyse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Analyse
      </button>
      <button class="nav-btn" data-nav="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
    </nav>
    <div class="sidebar-footer">Powered by Claude AI + Strava</div>
  </aside>

  <!-- Main -->
  <div class="main-area">

    <!-- Top bar (mobile) -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="greeting" id="greeting">Good morning, Omri</div>
        <div class="date" id="today-date">Loading…</div>
      </div>
      <div class="topbar-right">
        <button onclick="refreshData()" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Desktop header bar -->
    <div class="desktop-header">
      <div class="desktop-header-title" id="desktop-page-title">Today</div>
      <div class="desktop-header-right">
        <span class="header-date" id="desktop-date"></span>
        <button class="header-btn" onclick="refreshData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Refresh
        </button>
        <button class="header-btn" onclick="navigate('goals')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Generate Plan
        </button>
      </div>
    </div>

    <!-- Screens -->
    <div class="screens">
      <section id="screen-today"    class="screen"><div id="today-content"><div class="spinner"></div></div></section>
      <section id="screen-week"     class="screen"><div id="week-content"><div class="spinner"></div></div></section>
      <section id="screen-goals"    class="screen"><div id="goals-content"><div class="spinner"></div></div></section>
      <section id="screen-analyse"  class="screen"><div id="analyse-content"><div class="spinner"></div></div></section>
      <section id="screen-settings" class="screen"><div id="settings-content"><div class="spinner"></div></div></section>
    </div>

    <!-- Bottom Nav (mobile) -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-nav="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Today
      </button>
      <button class="nav-btn" data-nav="week">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Week
      </button>
      <button class="nav-btn" data-nav="goals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Goals
      </button>
      <button class="nav-btn" data-nav="analyse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Analyse
      </button>
      <button class="nav-btn" data-nav="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
    </nav>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="day-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="day-modal-body"></div>
  </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
