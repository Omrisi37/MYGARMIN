<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Running Coach — Sign In</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100dvh;text-align:center;padding:40px 24px;">
  <div style="max-width:320px;width:100%">
    <div style="font-size:72px;margin-bottom:24px">🏃</div>
    <h1 style="font-size:28px;font-weight:800;margin-bottom:8px">Running Coach</h1>
    <p style="font-size:15px;color:var(--text-dim);margin-bottom:48px;line-height:1.6">
      Your private AI-powered<br>marathon training assistant
    </p>
    <a id="login-btn"
       href="#"
       style="display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 24px;background:#24292e;color:white;border-radius:14px;font-size:16px;font-weight:600;text-decoration:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Sign in with GitHub
    </a>
    <p style="font-size:12px;color:var(--text-dim);margin-top:24px">Private access only</p>
  </div>
  <script>
    // Read CLIENT_ID injected at deploy time, or fall back to placeholder
    const CLIENT_ID = window.GITHUB_CLIENT_ID || "YOUR_GITHUB_CLIENT_ID";
    const CALLBACK = encodeURIComponent(window.location.origin + "/api/auth/callback");
    document.getElementById("login-btn").href =
      `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&scope=repo+workflow&redirect_uri=${CALLBACK}`;
  </script>
</body>
</html>
