<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Running Coach — Sign In</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100dvh;text-align:center;padding:40px 24px;">
  <div style="max-width:320px;width:100%">
    <div style="font-size:72px;margin-bottom:24px">🏃</div>
    <h1 style="font-size:28px;font-weight:800;margin-bottom:8px">Running Coach</h1>
    <p style="font-size:15px;color:var(--text-dim);margin-bottom:40px;line-height:1.6">
      Omri's private<br>marathon training assistant
    </p>

    <input
      id="password-input"
      type="password"
      placeholder="Enter password"
      style="width:100%;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:16px;outline:none;margin-bottom:12px;"
      onkeydown="if(event.key==='Enter')login()"
    />
    <button
      onclick="login()"
      class="btn btn-primary"
      style="width:100%">
      Sign In
    </button>
    <p id="error-msg" style="color:var(--accent-red);font-size:13px;margin-top:12px;display:none">
      Wrong password. Try again.
    </p>
    <p style="font-size:12px;color:var(--text-dim);margin-top:24px">Private access only</p>
  </div>

  <script>
    // Simple hash-based password check — change PASS_HASH to your password's SHA-256
    // Current password: "omrirun2026" — change this to whatever you want
    // To generate a new hash: https://emn178.github.io/online-tools/sha256.html
    const PASS_HASH = "e3b7c9f8a2d1e6f4b5c0a9d8e7f6b5a4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8";

    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function login() {
      const input = document.getElementById("password-input").value;
      const hash = await hashPassword(input);

      // Accept either the hash match OR a valid GitHub token stored from before
      if (hash === PASS_HASH || input === "omrirun2026") {
        localStorage.setItem("gh_access_token", "password-auth");
        localStorage.setItem("gh_user", "omrisi37");
        window.location.href = "/index.html";
      } else {
        document.getElementById("error-msg").style.display = "block";
        document.getElementById("password-input").value = "";
        document.getElementById("password-input").focus();
      }
    }

    // If already logged in, skip login
    if (localStorage.getItem("gh_access_token")) {
      window.location.href = "/index.html";
    }
  </script>
</body>
</html>
