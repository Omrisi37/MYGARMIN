name: Get Strava Refresh Token

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Your Strava Client ID (number from strava.com/settings/api)"
        required: true
        default: ""
      auth_code:
        description: "Leave empty on first run. Paste the code from the redirect URL on second run."
        required: false
        default: ""

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 — Authorization URL
        run: |
          echo ""
          echo "======================================================"
          echo "OPEN THIS URL IN YOUR BROWSER:"
          echo "======================================================"
          echo "https://www.strava.com/oauth/authorize?client_id=${{ inputs.client_id }}&response_type=code&redirect_uri=http://localhost&approval_prompt=force&scope=activity:read_all"
          echo "======================================================"
          echo "After authorizing, the browser redirects to localhost"
          echo "(the page won't load — that is fine)."
          echo "Copy the full URL from the address bar, find code=XXXX"
          echo "Re-run this workflow with that code in the second input."

      - name: Step 2 — Exchange code for refresh token
        if: ${{ inputs.auth_code != '' }}
        run: |
          pip install requests -q
          python3 - <<'EOF'
          import requests

          code = "${{ inputs.auth_code }}"
          resp = requests.post("https://www.strava.com/oauth/token", data={
              "client_id":     "${{ inputs.client_id }}",
              "client_secret": "${{ secrets.STRAVA_CLIENT_SECRET }}",
              "code":          code,
              "grant_type":    "authorization_code",
          })

          if not resp.ok:
              print(f"Error {resp.status_code}: {resp.text}")
              exit(1)

          data = resp.json()
          athlete = data.get("athlete", {})
          print("")
          print("======================================================")
          print("SUCCESS! Update GitHub secret STRAVA_REFRESH_TOKEN with:")
          print("======================================================")
          print(data["refresh_token"])
          print("======================================================")
          print(f"Scope: {data.get('scope')}")
          print(f"Athlete: {athlete.get('firstname','')} {athlete.get('lastname','')}")
          EOF
