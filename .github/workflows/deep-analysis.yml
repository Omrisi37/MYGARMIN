name: Deep Analysis & Improve Plan

on:
  workflow_dispatch:
    inputs:
      garmin_email:
        description: "Garmin email (from app settings)"
        required: false
      garmin_password:
        description: "Garmin password (from app settings)"
        required: false

jobs:
  deep-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run deep analysis
        env:
          GARMIN_EMAIL: ${{ inputs.garmin_email || secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ inputs.garmin_password || secrets.GARMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RACE_DATE: ${{ secrets.RACE_DATE }}
          TRAINING_GOAL: ${{ secrets.TRAINING_GOAL }}
          TARGET_TIME: ${{ secrets.TARGET_TIME }}
          RACE_NAME: ${{ secrets.RACE_NAME }}
          WEEKLY_HOURS: ${{ secrets.WEEKLY_HOURS }}
        run: python backend/deep_analysis_agent.py

      - name: Commit results
        run: |
          git config user.name "Running Coach Bot"
          git config user.email "bot@running-coach"
          git add data/analytics.json data/plan.json data/plan_*_backup.json 2>/dev/null || true
          git commit -m "Deep analysis: $(date +%Y-%m-%d)" || echo "No changes"
          git push
