name: Deep Analysis & Improve Plan

on:
  workflow_dispatch:

jobs:
  deep-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run deep analysis
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TRAINING_GOAL:        ${{ secrets.TRAINING_GOAL }}
          TARGET_TIME:          ${{ secrets.TARGET_TIME }}
          RACE_NAME:            ${{ secrets.RACE_NAME }}
          RACE_DATE:            ${{ secrets.RACE_DATE }}
          WEEKLY_HOURS:         ${{ secrets.WEEKLY_HOURS }}
        run: python backend/deep_analysis_agent.py

      - name: Commit results
        run: |
          git config user.name "Running Coach Bot"
          git config user.email "bot@running-coach"
          git pull --rebase origin main
          git add frontend/data/analytics.json frontend/data/plan.json frontend/data/plan_*_backup.json 2>/dev/null || true
          git commit -m "Deep analysis: $(date +%Y-%m-%d)" || echo "No changes"
          git push
