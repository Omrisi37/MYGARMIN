name: Generate Weekly Running Plan

on:
  schedule:
    - cron: "0 7 * * 1"  # Every Monday 7 AM UTC (adjust to your timezone)
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate weekly plan
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RACE_DATE: ${{ secrets.RACE_DATE }}
        run: python backend/run_coach_agent.py

      - name: Commit plan to repo
        run: |
          git config user.name "Running Coach Bot"
          git config user.email "bot@running-coach"
          git add data/plan.json data/plan_*_backup.json || true
          git commit -m "Weekly plan: $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
